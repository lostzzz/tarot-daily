<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 星辰塔罗 - 每日占卜</title>
    <meta name="version" content="1.2.0">
    <meta name="version-date" content="2026-03-20">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#0f0f1a;
            --bg2:#1a1a2e;
            --bg3:#252540;
            --gold:#d4af37;
            --gold2:#f0d875;
            --gold3:#b8962e;
            --purple:#7c3aed;
            --purple2:#a78bfa;
            --rose:#f43f5e;
            --cyan:#06b6d4;
            --text:#f8fafc;
            --text2:#cbd5e1;
            --muted:#64748b;
        }
        *{font-family:'Noto Sans SC',sans-serif}
        body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        
        /* 神秘星空背景 */
        .cosmos{position:fixed;inset:0;z-index:0;overflow:hidden}
        .cosmos::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(124,58,237,.15)0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(212,175,55,.1)0%,transparent 50%),radial-gradient(ellipse at 50% 50%,#0f0f1a 0%,#0a0a12 100%)}
        .nebula{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.15)0%,transparent 70%);top:-200px;left:-200px;animation:nebula 20s ease-in-out infinite}
        .nebula2{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(212,175,55,.1)0%,transparent 70%);bottom:-150px;right:-150px;animation:nebula2 25s ease-in-out infinite}
        @keyframes nebula{0%,100%{transform:translate(0,0)rotate(0deg)}50%{transform:translate(50px,30px)rotate(10deg)}}
        @keyframes nebula2{0%,100%{transform:translate(0,0)rotate(0deg)}50%{transform:translate(-30px,-20px)rotate(-5deg)}}
        
        .stars{position:absolute;inset:0}
        .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--duration,3s) ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:var(--min-opacity,.3);transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
        
        .shooting{position:absolute;width:150px;height:2px;background:linear-gradient(90deg,rgba(255,255,255,.8),transparent);animation:shoot 4s linear infinite;opacity:0}
        @keyframes shoot{0%{transform:translateX(-100px);opacity:0}10%{opacity:1}100%{transform:translateX(100vw);opacity:0}}
        
        .moon{position:absolute;top:8%;right:15%;width:80px;height:80px;background:radial-gradient(circle at 35% 35%,#fff9c4,#fcd34d);border-radius:50%;box-shadow:0 0 40px rgba(252,211,77,.5),0 0 80px rgba(252,211,77,.3);animation:moonGlow 6s ease-in-out infinite}
        @keyframes moonGlow{0%,100%{box-shadow:0 0 40px rgba(252,211,77,.5),0 0 80px rgba(252,211,77,.3)}50%{box-shadow:0 0 50px rgba(252,211,77,.7),0 0 100px rgba(252,211,77,.4)}}
        
        .container{position:relative;z-index:10;max-width:480px;margin:0 auto;padding:30px 20px;min-height:100vh}
        
        /* 标题 */
        header{text-align:center;padding:20px 0 30px}
        .logo{font-size:3.5rem;margin-bottom:8px;animation:float 4s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        h1{font-family:'ZCOOL XiaoWei',serif;font-size:2.2rem;background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:6px;margin-bottom:8px}
        .subtitle{color:var(--muted);font-size:.85rem;letter-spacing:4px}
        
        /* 卡片 */
        .card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border-radius:24px;padding:28px;margin-bottom:20px;border:1px solid rgba(212,175,55,.15);box-shadow:0 20px 60px rgba(0,0,0,.4)}
        
        .section-title{font-family:'ZCOOL XiaoWei',serif;font-size:1.3rem;color:var(--gold);text-align:center;margin-bottom:24px;position:relative}
        .section-title::before,.section-title::after{content:'✧';margin:0 10px;color:var(--purple);font-size:1rem}
        
        /* 问题选择 */
        .q-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
        .q-btn{background:linear-gradient(145deg,var(--bg3),#1e1e35);border:2px solid transparent;border-radius:20px;padding:24px 12px;cursor:pointer;transition:.4s;text-align:center;position:relative;overflow:hidden}
        .q-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--purple),transparent);opacity:0;transition:.4s}
        .q-btn:hover{border-color:var(--purple2);transform:translateY(-4px);box-shadow:0 12px 30px rgba(124,58,237,.3)}
        .q-btn:hover::before{opacity:.15}
        .q-btn.sel{border-color:var(--gold);background:linear-gradient(145deg,rgba(212,175,55,.15),rgba(212,175,55,.05))}
        .q-btn.sel::before{opacity:.2}
        .q-btn .icon{font-size:2.8rem;display:block;margin-bottom:10px;position:relative}
        .q-btn .label{font-size:1rem;color:var(--text);position:relative;font-weight:500}
        
        /* 按钮 */
        .btn{display:block;width:100%;padding:18px;font-family:'ZCOOL XiaoWei',serif;font-size:1.1rem;color:#0f0f1a;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:40px;cursor:pointer;letter-spacing:4px;transition:.3s;box-shadow:0 8px 30px rgba(212,175,55,.4)}
        .btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(212,175,55,.5)}
        .btn:disabled{background:var(--muted);cursor:not-allowed;box-shadow:none;transform:none}
        
        /* 倒计时 */
        .countdown{text-align:center;padding:20px;color:var(--muted);font-size:.9rem}
        .countdown .timer{color:var(--gold);font-family:'ZCOOL XiaoWei',serif;font-size:1.2rem}
        
        /* 抽牌区 */
        .draw-area{margin:30px 0;text-align:center}
        .card-wrapper{width:180px;height:280px;margin:0 auto;position:relative;perspective:1200px}
        .tarot{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1.2s cubic-bezier(.4,0,.2,1)}
        .tarot.flipped{transform:rotateY(180deg)}
        
        .card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
        
        /* 牌背 */
        .card-back{background:linear-gradient(145deg,#1a1a24 0%,#12121a 50%,#1a1a24 100%);border-radius:12px;cursor:pointer;position:relative;transition:all .3s;display:flex;align-items:center;justify-content:center;border:2px solid var(--gold)}
        .card-back:hover{transform:scale(1.05);box-shadow:0 20px 60px rgba(0,0,0,.6),0 0 40px rgba(201,162,39,.3)}
        .card-back::before{content:'';position:absolute;top:20px;left:20px;right:20px;bottom:20px;border:2px solid var(--purple);border-radius:12px;opacity:.3}
        .card-back::after{content:'☽';font-size:3.5rem;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.5)}
        
        /* 牌面 */
        .card-front{background:linear-gradient(145deg,var(--bg2),#12121f);border:3px solid var(--gold);transform:rotateY(180deg);flex-direction:column;padding:15px}
        .card-img{width:130px;height:190px;object-fit:contain;border-radius:10px;background:#fff;box-shadow:0 8px 25px rgba(0,0,0,.4)}
        .card-num{position:absolute;top:12px;left:14px;font-family:'ZCOOL XiaoWei',serif;font-size:1rem;color:var(--gold)}
        .card-name{font-family:'ZCOOL XiaoWei',serif;font-size:1.3rem;color:var(--gold);margin-top:12px;letter-spacing:2px}
        .card-en{font-size:.75rem;color:var(--muted);margin-top:4px}
        
        .hint{color:var(--muted);margin-top:20px;font-size:.9rem}
        
        /* 结果页 */
        .result{animation:fadeIn .6s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        
        .r-card{background:linear-gradient(145deg,var(--bg2),var(--bg3));border-radius:24px;padding:25px;margin-bottom:20px;border:1px solid rgba(212,175,55,.2);text-align:center}
        .r-img{width:160px;height:240px;object-fit:contain;border-radius:14px;box-shadow:0 15px 50px rgba(0,0,0,.5);margin-bottom:20px}
        .r-name{font-family:'ZCOOL XiaoWei',serif;font-size:1.6rem;color:var(--gold);margin-bottom:4px}
        .r-en{font-size:.85rem;color:var(--muted);margin-bottom:15px}
        .r-tag{display:inline-block;background:linear-gradient(135deg,var(--purple),#5b21b6);color:#fff;padding:6px 20px;border-radius:20px;font-size:.85rem;margin-bottom:20px}
        
        .r-section{text-align:left;padding:18px;background:rgba(124,58,237,.08);border-radius:14px;margin:16px 0;border-left:4px solid var(--purple)}
        .r-section.advice{background:rgba(212,175,55,.08);border-left-color:var(--gold)}
        .r-label{font-size:.8rem;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .r-label::before{content:'◈'}
        .r-label.adv{color:var(--gold)}
        .r-label.adv::before{content:'★'}
        .r-text{font-size:.95rem;line-height:1.8;color:var(--text2)}
        
        .r-luck{background:var(--bg);border-radius:16px;padding:18px;margin-top:18px}
        .r-luck-t{font-size:.85rem;color:var(--gold);margin-bottom:14px;text-align:center}
        .r-luck-g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .r-luck-i{background:var(--bg2);padding:12px 6px;border-radius:12px;text-align:center}
        .r-luck-i .ic{font-size:1.4rem;display:block;margin-bottom:4px}
        .r-luck-i .lb{font-size:.6rem;color:var(--muted);display:block}
        .r-luck-i .val{font-size:.8rem;color:var(--gold);font-weight:500}
        
        .mback{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s}
        .mback.show{display:flex}
        .modal{background:linear-gradient(145deg,var(--bg2),#0f0f18);border-radius:28px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid rgba(212,175,55,.3);animation:slideUp .4s}
        @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
        .mhead{text-align:center;padding:25px;border-bottom:1px solid rgba(124,58,237,.2)}
        .m-img{width:170px;height:250px;object-fit:contain;border-radius:14px;box-shadow:0 15px 50px rgba(0,0,0,.5)}
        .m-name{font-family:'ZCOOL XiaoWei',serif;font-size:1.5rem;color:var(--gold);margin:15px 0 5px}
        .m-en{font-size:.8rem;color:var(--muted)}
        .m-pos{display:inline-block;background:var(--purple);color:#fff;padding:5px 16px;border-radius:15px;font-size:.8rem;margin-top:12px}
        .m-body{padding:22px}
        .m-q{background:var(--bg);border-radius:14px;padding:15px;margin-bottom:18px;text-align:center}
        .m-q .lb{font-size:.75rem;color:var(--muted)}
        .m-q .val{font-size:1.1rem;color:var(--gold);margin-top:5px}
        .m-sec{margin:16px 0}
        .m-t{font-size:.78rem;color:var(--purple);margin-bottom:8px}
        .m-t::before{content:'◈ ';margin-right:4px}
        .m-t.gold{color:var(--gold)}
        .m-t.gold::before{content:'★ '}
        .m-txt{font-size:.95rem;line-height:1.8;color:var(--text2)}
        .mclose{width:100%;padding:15px;background:0 0;border:none;border-top:1px solid rgba(124,58,237,.2);color:var(--muted);cursor:pointer;font-size:.95rem;transition:.3s}
        .mclose:hover{background:rgba(124,58,237,.1);color:var(--text)}
        
        .hidden{display:none!important}
        
        .wish-page,.blessing-page{margin-top:15px}
        @media(max-width:400px){.q-grid{grid-template-columns:1fr;gap:12px}.card-wrapper{width:160px;height:240px}.card-img{width:100px;height:150px}}
    </style>
</head>
<body>
    <div class="cosmos">
        <div class="nebula"></div>
        <div class="nebula2"></div>
        <div class="stars" id="stars"></div>
        <div class="moon"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="logo">🌙</div>
            <h1>星辰塔罗</h1>
            <p class="subtitle">每日一次 · 神秘指引</p>
        </header>
        
        <!-- 问题选择 -->
        <div class="card" id="qSec">
            <h2 class="section-title">感应你的问题</h2>
            <div class="nickname-area" style="text-align:center;margin-bottom:14px;">
                <input type="text" id="nickname" placeholder="输入你的昵称" maxlength="20" style="width:180px;padding:10px 14px;font-size:.9rem;border:2px solid var(--purple);border-radius:20px;background:var(--bg2);color:var(--text);text-align:center;outline:none;">
            </div>
            <div class="q-grid">
                <div class="q-btn" data-t="爱情" onclick="selectQ(this)">
                    <span class="icon">💕</span>
                    <span class="label">爱情</span>
                </div>
                <div class="q-btn" data-t="事业" onclick="selectQ(this)">
                    <span class="icon">💼</span>
                    <span class="label">事业</span>
                </div>
                <div class="q-btn" data-t="财富" onclick="selectQ(this)">
                    <span class="icon">💰</span>
                    <span class="label">财富</span>
                </div>
            </div>
            <button class="btn" id="startBtn" onclick="startD()">✨ 开启占卜</button>
        </div>
        
        <!-- 抽牌区 -->
        <div class="card hidden" id="drawSec">
            <h2 class="section-title">抽取你的命运之牌</h2>
            <div class="draw-area">
                <div class="card-wrapper">
                    <div class="tarot" id="theTarot">
                        <div class="card-face card-back"></div>
                        <div class="card-face card-front">
                            <span class="card-num" id="cardNum"></span>
                            <img class="card-img" id="cardImg" src="" alt="">
                            <div class="card-name" id="cardName"></div>
                            <div class="card-en" id="cardEn"></div>
                        </div>
                    </div>
                </div>
                <p class="hint" id="hint">点击按钮抽取塔罗牌</p>
            </div>
            <button class="btn" id="drawBtn" onclick="drawC()">🔮 抽取塔罗牌</button>
        </div>
        
        <!-- 今日已占卜 -->
        <div class="card hidden" id="countSec">
            <div class="countdown">
                <p>今日占卜已完成</p>
                <p class="timer" id="timer"></p>
            </div>
            <button class="btn" onclick="viewLast()">📜 查看上次结果</button>
        </div>
        
        <!-- 结果页 -->
        <div class="result hidden" id="resultSec">
            <div class="r-card">
                <img class="r-img" id="rImg" src="" alt="">
                <div class="r-name" id="rName"></div>
                <div class="r-en" id="rEn"></div>
                <span class="r-tag" id="rTag"></span>
                
                <div class="r-section">
                    <p class="r-label">星语解读</p>
                    <p class="r-text" id="rMean"></p>
                </div>
                <div class="r-section advice">
                    <p class="r-label adv">灵慧指引</p>
                    <p class="r-text" id="rAdv"></p>
                </div>
                
                <div class="r-luck">
                    <p class="r-luck-t">✦ 今日幸运 ✦</p>
                    <div class="r-luck-g" id="rLuck"></div>
                </div>
            </div>
            <button class="btn" id="wishBtn" onclick="showWish()" style="margin-top:10px">💫 许个愿吧</button>
        </div>
        
        <!-- 愿望页 -->
        <div class="wish-page hidden" id="wishSec">
            <div class="r-card" style="text-align:center">
                <h2 class="section-title">🌟 许下你的愿望</h2>
                <textarea id="wishText" placeholder="写下你的愿望..." maxlength="200" style="width:100%;height:100px;padding:12px;margin:15px 0;background:var(--bg2);border:2px solid var(--purple);border-radius:14px;color:#fff;font-size:.9rem;resize:none;outline:none;text-align:center;line-height:1.6"></textarea>
                <button class="btn" onclick="submitWish()">✨ 提交愿望</button>
            </div>
        </div>
        
        <!-- 祝福页 -->
        <div class="blessing-page hidden" id="blessSec">
            <div class="r-card" style="text-align:center">
                <div style="font-size:3rem;margin-bottom:15px">🌟</div>
                <h2 class="section-title" id="blessTitle"></h2>
                <p id="blessText" style="color:var(--text2);line-height:1.8;margin:15px 0;font-size:.95rem"></p>
                <button class="btn" onclick="resetA()">↺ 重新占卜</button>
            </div>
        </div>
    </div>
    
    <!-- 弹窗 -->
    <div class="mback" id="modal">
        <div class="modal">
            <div class="mhead">
                <img class="m-img" id="mImg" src="">
                <div class="m-name" id="mName"></div>
                <div class="m-en" id="mEn"></div>
                <span class="m-pos" id="mPos"></span>
            </div>
            <div class="m-body">
                <div class="m-q">
                    <p class="lb">你问的是</p>
                    <p class="val" id="mQ"></p>
                </div>
                <div class="m-sec">
                    <p class="m-t">星语解读</p>
                    <p class="m-txt" id="mMean"></p>
                </div>
                <div class="m-sec">
                    <p class="m-t gold">灵慧指引</p>
                    <p class="m-txt" id="mAdv"></p>
                </div>
            </div>
            <button class="mclose" onclick="closeM()">关闭</button>
        </div>
    </div>

<script>
// 22张塔罗牌 - 趣味解读版
const tarot=[
{id:0,n:'愚人',e:'The Fool',i:'http://www.learntarot.com/maj00s.gif',
l:'🌸 爱情如同一场未知的冒险，你准备好迎接惊喜了吗？可能转角遇到爱，或者遇到一个让你心跳加速的TA！单身的朋友们，桃花运正在靠近哦～已有伴的，可能和另一半开启一段新旅程！',c:'🚀 事业上像一张白纸等着你书写！新机会像突然掉下来的馅饼，可能是新项目、创业灵感，或者有人给你指了条明路。大胆去尝试吧，宇宙在帮你铺路呢！',mo:'💰 财运来了挡不住！可能突然多了一条来钱路，比如兼职、投资回报，或者有人请你吃饭买单。新钱包在路上啦～'},
{id:1,n:'魔术师',e:'The Magician',i:'http://www.learntarot.com/maj01s.gif',
l:'✨ 展现你真正的魅力吧！吸引力法则生效中，表白成功率 up up！单身的朋友，是时候放出你的魅力电波了～有伴的，和另一半创造一些小惊喜，感情升温！',c:'💪 能量爆棚期！你的能力正在被看见，升职加薪或被委以重任的可能性很高。把握机会，你的才华该发光发热了！',mo:'🤑 聪明才智变现时！脑子灵活，赚钱点子特别多。可能会收到意想不到的收益，或者买到超值的东东。'},
{id:2,n:'女祭司',e:'The Priestess',i:'http://www.learntarot.com/maj02s.gif',
l:'💕 爱情不急，时候未到。先倾听内心的声音，TA也在等你准备好。独处一段时间不是坏事，真爱值得等待～',c:'🧠 需要动脑筋的时期！不要冲动做决定，先冷静分析。灵感可能在你放空的时候突然降临。',mo:'🛡️ 稳住别浪！投资决策要谨慎，三思而后行。钱要花在刀刃上，不要冲动购物或投资。'},
{id:3,n:'皇后',e:'The Empress',i:'http://www.learntarot.com/maj03s.gif',

// 初始化星空
function createStars(){
    const s=document.getElementById('stars');
    for(let i=0;i<80;i++){
        let x=document.createElement('div');
        x.className='star';
        x.style.left=Math.random()*100+'%';
        x.style.top=Math.random()*100+'%';
        x.style.width=x.style.height=(Math.random()*2+1.5)+'px';
        x.style.setProperty('--duration',(Math.random()*2+2)+'s');
        x.style.setProperty('--min-opacity',.2);
        x.style.animationDelay=Math.random()*3+'s';
        s.appendChild(x);
    }
    // 流星
    for(let i=0;i<3;i++){
        let m=document.createElement('div');
        m.className='shooting';
        m.style.top=(Math.random()*60+20)+'%';
        m.style.left=(Math.random()*30)+'%';
        m.style.animationDelay=Math.random()*5+'s';
        s.appendChild(m);
    }
}

// 检查是否今天已占卜
function checkDaily(){
    const today=new Date().toDateString();
    const last=localStorage.getItem('tarot_last_date');
    lastResult=JSON.parse(localStorage.getItem('tarot_last_result')||'null');
    
    if(last===today && lastResult){
        document.getElementById('qSec').classList.add('hidden');
        document.getElementById('countSec').classList.remove('hidden');
        updateTimer();
        return true;
    }
    return false;
}

// 更新倒计时
function updateTimer(){
    const now=new Date();
    const tomorrow=new Date(now);
    tomorrow.setDate(tomorrow.getDate()+1);
    tomorrow.setHours(0,0,0,0);
    const diff=tomorrow-now;
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    document.getElementById('timer').textContent=`${h}小时${m}分钟后可再次占卜`;
}

// 选择问题
function selectQ(el){
    document.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('sel'));

    qType=el.dataset.t;
}

    const nickname=document.getElementById('nickname').value.trim();

    if(!qType){alert('请选择一个想问的问题');return;}
    question=qType;
    window.userNickname=nickname;
    document.getElementById('qSec').classList.add('hidden');
    document.getElementById('drawSec').classList.remove('hidden');

// 抽牌
function drawC(){
    const btn=document.getElementById('drawBtn');
    btn.disabled=true;
    btn.textContent='洗牌中...';
    document.getElementById('hint').textContent='命运之牌正在显现...';
    
    setTimeout(()=>{
        const card=tarot[Math.floor(Math.random()*tarot.length)];
        currentCard=card;
        
        const t=document.getElementById('theTarot');
        t.classList.remove('flipped');
        
        setTimeout(()=>{
            document.getElementById('cardNum').textContent=card.id;
            document.getElementById('cardImg').src=card.i;
            document.getElementById('cardName').textContent=card.n;
            document.getElementById('cardEn').textContent=card.e;
            t.classList.add('flipped');
            
            setTimeout(()=>{
                showResult();
                saveResult();
                btn.disabled=false;
                btn.textContent='🔮 重新抽牌';
                document.getElementById('hint').textContent='牌面已翻转，看看你的命运吧';
            },1500);
        },800);
    },600);
}

function submitWish(){
    const wish=document.getElementById('wishText').value.trim();
    if(!wish){alert('请输入你的愿望');return;}
    
    // 保存愿望到本地记录
    const records=JSON.parse(localStorage.getItem('tarot_records')||'[]');
    let currentRecord = null;
    if(records.length>0){
        records[records.length-1].wish=wish;
        currentRecord = records[records.length-1];
        localStorage.setItem('tarot_records',JSON.stringify(records));
    }
    
    // 上传到 Firebase
    if(currentRecord){
        db.ref('records').push({
            nickname: currentRecord.nickname || '匿名',
            question: currentRecord.question,
            card: currentRecord.card,
            cardEn: currentRecord.cardEn,
            wish: wish,
            meaning: currentRecord.meaning,
            date: currentRecord.date,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
